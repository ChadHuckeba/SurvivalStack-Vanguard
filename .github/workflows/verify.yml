name: Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh
      
    - name: Sync dependencies
      run: uv sync
      
    - name: Lint with ruff
      run: uv run ruff check .
      
    - name: Type-check with mypy
      run: uv run mypy src/
      
    - name: Run tests
      run: uv run pytest
